services:
  postgres:
    image: postgres:16
    container_name: sentinelgraph-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/local/init-schemas.sql:/docker-entrypoint-initdb.d/init-schemas.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  chroma:
    image: chromadb/chroma:0.5.23
    container_name: sentinelgraph-chroma
    restart: unless-stopped
    ports:
      - "${CHROMA_PORT}:8000"
    volumes:
      - chroma_data:/chroma/chroma

  minio:
    image: minio/minio:latest
    container_name: sentinelgraph-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  model-gateway:
    build: ./services/model_gateway
    container_name: sentinelgraph-model-gateway
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    container_name: sentinelgraph-orchestrator
    restart: unless-stopped
    env_file: .env
    environment:
      MODEL_GATEWAY_URL: http://model-gateway:8080
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT}
      EXTERNAL_CRM_URL: http://external-crm:8200
      EXTERNAL_CRM_API_KEY: ${EXTERNAL_CRM_API_KEY}
    ports:
      - "8090:8090"
    depends_on:
      - model-gateway
      - postgres

  dashboard:
    build: ./services/dashboard
    container_name: sentinelgraph-dashboard
    restart: unless-stopped
    ports:
      - "3000:80"

  chat-ui:
    build: ./services/chat_ui
    container_name: sentinelgraph-chat-ui
    restart: unless-stopped
    ports:
      - "3001:80"

  prometheus:
    image: prom/prometheus:latest
    container_name: sentinelgraph-prometheus
    restart: unless-stopped
    volumes:
      - ./infra/local/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - model-gateway
      - orchestrator

  grafana:
    image: grafana/grafana:latest
    container_name: sentinelgraph-grafana
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus

  identity:
    build: ./services/identity
    container_name: sentinelgraph-identity
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    ports:
      - "8110:8100"
    depends_on:
      - postgres

  auth-ui:
    build: ./services/auth_ui
    container_name: sentinelgraph-auth-ui
    restart: unless-stopped
    ports:
      - "3003:80"

  approvals-ui:
    build: ./services/approvals_ui
    container_name: sentinelgraph-approvals-ui
    restart: unless-stopped
    ports:
      - "3004:80"

  external-crm:
    build: ./services/external_crm
    container_name: sentinelgraph-external-crm
    restart: unless-stopped
    environment:
      EXTERNAL_CRM_API_KEY: ${EXTERNAL_CRM_API_KEY}
    ports:
      - "8200:8200"

volumes:
  postgres_data:
  chroma_data:
  minio_data: